<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Embedded Scratch Project</title>
<style>
    body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        text-align: center;
        background-color: #f2f2f2;
    }

    .container {
        margin-top: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    h1 {
        color: #333;
    }

    .scratch-iframe {
        border: 2px solid #3366FF; /* Colored border */
        border-radius: 10px;
        overflow: hidden;
        background-color: #000000;
    }

    #mute-button {
        margin-top: 20px;
        padding: 10px 20px;
        background-color: #FF3366; /* Change color for mute button */
        color: #fff;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    #mute-button:hover {
        background-color: #CC0044;
    }

    #reload-button {
        margin-top: 20px;
        padding: 10px 20px;
        background-color: #3366FF;
        color: #fff;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    #reload-button:hover {
        background-color: #0044CC;
    }
</style>
</head>
<body>
<div class="container">
    <h1>Game</h1>
    <iframe class="scratch-iframe" src="https://scratch.mit.edu/projects/999307718/embed" allowtransparency="true" width="1220" height="975" frameborder="0" scrolling="no" allowfullscreen></iframe>
</div>
<button id="mute-button" onclick="toggleMute()">Mute</button>
<button id="reload-button" onclick="reloadPage()">Reload</button>

<script>
    function toggleMute() {
        var iframe = document.querySelector('iframe');
        iframe.contentWindow.postMessage({method: 'setMuted', muted: true}, 'https://scratch.mit.edu');
    }

    function reloadPage() {
        location.reload();
    }
</script>
</body>
</html>
