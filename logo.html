<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Logo</title>
  <style>
    .logo {
      position: relative;
      width: 100px;
      height: 100px;
      background-color: black;
      box-shadow: inset 0 0 9px lighten(black, 20%);
    }

    .left-rect {
      position: absolute;
      top: 25px;
      left: 25px;
      width: 50px;
      height: 50px;
      background-color: gray;
    }

    .right-rect {
      position: absolute;
      top: 50px;
      right: 25px;
      width: 25px;
      height: 25px;
      background-color: gray;
    }
  </style>
</head>
<body>
  <div class="logo">
    <div class="left-rect"></div>
    <div class="right-rect"></div>
  </div>
</body>
</html>
